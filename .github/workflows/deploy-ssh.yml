# Remote host details and credentials live only in GitHub Secrets — nothing sensitive in this file.

name: Deploy production (SSH)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-nango-vibe-relay
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install and build (no verbose audit output)
        run: npm ci --no-audit --no-fund && npm run build

      # Do NOT ship .htaccess: cPanel/LiteSpeed writes Passenger directives here; our repo file would overwrite them on extract and Node would stop handling /nango/*.
      - name: Pack deploy bundle
        run: tar -czf deploy-bundle.tar.gz dist public package.json package-lock.json server.js

      - name: Upload bundle via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: deploy-bundle.tar.gz
          target: ${{ secrets.DEPLOY_REMOTE_APP_DIR }}
          overwrite: true
          debug: false

      - name: Extract and install production dependencies on server
        env:
          REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_APP_DIR }}
          NPM_BIN_OVERRIDE: ${{ secrets.DEPLOY_NPM_BIN }}
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USERNAME }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: REMOTE_DIR,NPM_BIN_OVERRIDE
          debug: false
          script: |
            set -euo pipefail
            cd "${REMOTE_DIR}"
            HOME="${HOME:-$(getent passwd "$(id -un)" | cut -d: -f6)}"
            export HOME
            tar -xzf deploy-bundle.tar.gz
            rm -f deploy-bundle.tar.gz
            rm -rf node_modules
            NPM_BIN=""
            if [ -n "${NPM_BIN_OVERRIDE:-}" ] && [ -x "${NPM_BIN_OVERRIDE}" ]; then
              NPM_BIN="${NPM_BIN_OVERRIDE}"
            fi
            # cPanel mirrors app dir under ~/nodevenv/public_html/<same-relative-path>/<major>/bin/npm
            if [ -z "${NPM_BIN}" ] && [[ "${REMOTE_DIR}" == */public_html/* ]]; then
              PARENT="${REMOTE_DIR%/public_html/*}"
              REL="${REMOTE_DIR#*/public_html/}"
              NODEENV_APP="${PARENT}/nodevenv/public_html/${REL}"
              for cand in "${NODEENV_APP}/"*/bin/npm; do
                if [ -x "${cand}" ]; then NPM_BIN="${cand}"; break; fi
              done
            fi
            if [ -z "${NPM_BIN}" ]; then
              NPM_BIN="$(find "${HOME}" -path '*/nodevenv/*' -type f -name npm 2>/dev/null | head -1)" || true
              [ -n "${NPM_BIN}" ] && [ -x "${NPM_BIN}" ] || NPM_BIN=""
            fi
            if [ -z "${NPM_BIN}" ]; then
              for v in 22 21 20 18 16; do
                p="/opt/cpanel/ea-nodejs${v}/bin/npm"
                if [ -x "${p}" ]; then NPM_BIN="${p}"; break; fi
              done
            fi
            if [ -z "${NPM_BIN}" ] && [ -x "/opt/cloudlinux/alt-nodejs20/root/usr/bin/npm" ]; then
              NPM_BIN="/opt/cloudlinux/alt-nodejs20/root/usr/bin/npm"
            fi
            if [ -z "${NPM_BIN}" ]; then
              echo "Could not find npm. Set secret DEPLOY_NPM_BIN. On SSH: ls \"\$HOME/nodevenv/public_html/…/nango\"/*/bin/npm" >&2
              exit 127
            fi
            echo "Using npm: ${NPM_BIN}"
            "${NPM_BIN}" ci --omit=dev --no-audit --no-fund
            mkdir -p tmp
            touch tmp/restart.txt
